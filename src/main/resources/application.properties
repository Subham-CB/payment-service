spring.application.name=paymentServices

server.port =8081

# Database Configuration - PostgresSQL (Production/Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/transactions_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/docs